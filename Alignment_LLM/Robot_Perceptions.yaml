objects:
    object1.label: "button"
    object1.color: "white"
    object1.x_position: continuous value that is normalized between 0 and 1, where 0 is the left edge and 1 is the right edge of the table.
    object1.y_position: continuous value that is normalized between 0 and 1, where 0 is the bottom edge and 1 is the top edge of the table.
    object1.diameter: Returns the normalized diameter of the object as a float between 0 and 1. In this case it is 0.3.
    object1.state: it can be 0 (not pressed), 1 (pressed)

